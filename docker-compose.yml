version: '3.8'

services:
  # Database Service with pgvector extension pre-installed
  db:
    image: pgvector/pgvector:pg16
    container_name: wedding_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Redis for task queue management
  redis:
    image: redis:alpine
    container_name: wedding_redis
    restart: always

  # The Main API Backend
  backend:
    build: ./backend
    container_name: wedding_api
    volumes:
      - ./storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@db:5432/${POSTGRES_DB}
      DB_POOL_SIZE: 25
      DB_MAX_OVERFLOW: 50
      DB_POOL_TIMEOUT: 60
      DB_POOL_RECYCLE: 1800
      REDIS_URL: redis://redis:6379/0
      GOOGLE_CREDENTIALS_JSON: ${GOOGLE_CREDENTIALS_JSON}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
    restart: always

  worker:
    build: ./backend
    container_name: wedding_worker
    command: celery -A app.worker.celery worker --loglevel=info --concurrency=4
    volumes:
      - ./storage:/storage
    depends_on:
      - db
      - redis
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD_ENCODED}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      GOOGLE_CREDENTIALS_JSON: ${GOOGLE_CREDENTIALS_JSON}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: wedding_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always



volumes:
  postgres_data:
