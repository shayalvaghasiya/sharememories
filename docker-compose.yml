version: '3.8'

services:
  # Database Service with pgvector extension pre-installed
  db:
    image: pgvector/pgvector:pg16
    container_name: wedding_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wedding_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  # Redis for task queue management
  redis:
    image: redis:alpine
    container_name: wedding_redis
    ports:
      - "6379:6379"
    restart: always

  # The Main API Backend
  backend:
    build: ./backend
    container_name: wedding_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://admin:password@db:5432/wedding_db
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env

  worker:
    build: ./backend
    container_name: wedding_worker
    command: celery -A app.worker.celery worker --loglevel=info --concurrency=1
    volumes:
      - ./backend:/app
      - ./storage:/storage
    depends_on:
      - db
      - redis
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://admin:password@db:5432/wedding_db
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: wedding_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"



volumes:
  postgres_data:
