version: '3.8'

services:
  # Database Service with pgvector extension pre-installed
  db:
    image: pgvector/pgvector:pg16
    container_name: wedding_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wedding_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Redis for task queue management
  redis:
    image: redis:alpine
    container_name: wedding_redis
    restart: always

  # The Main API Backend
  backend:
    build: ./backend
    container_name: wedding_api
    volumes:
      - ./storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://admin:password@db:5432/wedding_db
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    restart: always

  worker:
    build: ./backend
    container_name: wedding_worker
    command: celery -A app.worker.celery worker --loglevel=info --concurrency=4
    volumes:
      - ./storage:/storage
    depends_on:
      - db
      - redis
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://admin:password@db:5432/wedding_db
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: wedding_frontend
    ports:
      - "3000:3000"
    restart: always



volumes:
  postgres_data:
